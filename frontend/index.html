<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>File Editor Webapp</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="/styles.css">
    </head>
    <body>
        <header>
            <h1>File Editor Webapp</h1>
        </header>
        <main>
            <section>
                <h2>Viewer</h2>
                    <div>
                        <input type="file" id="pdf-file-input" accept=".pdf">
                        <button id="upload-btn" class="border border-blue-600 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors">Upload file</button>
                        <p id="status-message"></p>
                    </div>
                
                <div id="pdf-render-area">
                    <p>No PDF loaded</p>
                </div>
            </section>

            <section>
                <h2>Editor Tool</h2>
                <div id="editor-tools">

                </div>
            </section>
        </main>
        <script type="module" src="/app.js"></script>
    </body>
</html>
